<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bank Transaction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="transaction-bg" onload="checkLogin(); calculateMoney();">

<div class="navbar bank-blue">
  <div class="logo">香港大学生银行</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="add-record.html">Transaction</a>
    <a href="record-list.html">History</a>
    <a href="change-pwd.html">Change Password</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">
  <div class="card bank-card" style="margin-bottom: 1rem;">
    <h4>Welcome, <span id="userName"></span></h4>
  </div>

  <div class="flex">
    <div class="card bank-card">
      <h4>Total Deposit</h4>
      <h2 id="income" class="green-text">$0.00</h2>
    </div>
    <div class="card bank-card">
      <h4>Total Withdraw</h4>
      <h2 id="expense" class="red-text">$0.00</h2>
    </div>
    <div class="card bank-card">
      <h4>Account Balance</h4>
      <h2 id="balance" class="balance-text">$0.00</h2>
    </div>
  </div>

  <div class="card bank-card" style="margin-top: 2rem;">
    <h3>New Transaction</h3>
    <div class="form-group">
      <label>Transaction Type</label>
      <select id="type" class="form-control">
        <option value="Deposit">Deposit (存钱)</option>
        <option value="Withdraw">Withdraw (取钱)</option>
        <option value="Transfer">Transfer (转账)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount (金额)</label>
      <input type="number" id="amount" step="0.01" min="0.01" placeholder="Enter amount" class="form-control">
    </div>
    <div class="form-group">
      <label>Date (日期)</label>
      <input type="date" id="date" class="form-control">
    </div>
    <div class="form-group" id="targetAccountGroup" style="display: none;">
      <label>Target Account (转账目标账户)</label>
      <input type="text" id="targetAccount" placeholder="Enter target account username" class="form-control">
    </div>
    <div class="form-group">
      <label>Remark (备注)</label>
      <input type="text" id="remark" placeholder="Enter remark (optional)" class="form-control">
    </div>
    <button onclick="doTransaction()" class="bank-btn">Submit Transaction</button>
  </div>
</div>

<script>
  document.getElementById('date').valueAsDate = new Date();
  document.getElementById('type').addEventListener('change', function() {
    document.getElementById('targetAccountGroup').style.display =
      this.value === 'Transfer' ? 'block' : 'none';
  });
</script>
<script src="app.js"></script>
</body>
</html>
