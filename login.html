<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar bank-blue">
  <div class="logo">香港大学生银行</div>
  <div class="nav-links">
    <a href="login.html">Login</a>
  </div>
</div>

<div class="container" style="max-width: 450px;">
  <div class="card bank-card cursive-font">
    <h3>Login / Register</h3>

    <div class="form-group">
      <label>Account</label>
      <input id="account" placeholder="Enter your account">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter your password">
    </div>

    <button onclick="login()" class="bank-btn">Login</button>
    <button onclick="register()" class="bank-btn secondary">Register</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
